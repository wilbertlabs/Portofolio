<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Clones Preview - CodingX Indonet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        h1 span {
            color: #fbbf24;
            font-style: italic;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5%;
            width: 100%;
            max-width: 1400px;
        }

        /* CLASS UTAMA - width 18% height 37vh */
        .clone-instagram,
        .clone-netflix,
        .clone-whatsapp,
        .clone-youtube,
        .clone-spotify {
            width: 18%;
            height: 37vh;
            min-width: 160px;
            /* border-radius: 24px; */
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .clone-instagram:hover,
        .clone-netflix:hover,
        .clone-whatsapp:hover,
        .clone-youtube:hover,
        .clone-spotify:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #fbbf24;
            box-shadow: 0 30px 40px -10px #000;
        }

        /* Overlay untuk nama aplikasi */
        .app-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: white;
            padding: 15px 10px 10px;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .app-overlay i {
            margin-right: 8px;
            font-size: 14px;
            color: #fbbf24;
        }

        /* Background preview untuk setiap clone */
        .clone-instagram {
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .instagram-preview {
            width: 90%;
            height: 85%;
            background: #000;
            border-radius: 20px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .ig-header {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            color: white;
            font-size: 10px;
        }

        .ig-logo {
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ig-story {
            display: flex;
            gap: 5px;
            margin: 5px 0;
        }

        .ig-story-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b);
        }

        .ig-post {
            flex: 1;
            background: #222;
            border-radius: 8px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 8px;
        }

        /* Netflix Clone */
        .clone-netflix {
            background: #141414;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .netflix-preview {
            width: 90%;
            height: 85%;
            display: flex;
            flex-direction: column;
        }

        .netflix-logo {
            color: #e50914;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .netflix-row {
            display: flex;
            gap: 5px;
            margin: 5px 0;
        }

        .netflix-card {
            width: 30%;
            aspect-ratio: 2/3;
            background: linear-gradient(145deg, #333, #222);
            border-radius: 4px;
        }

        /* WhatsApp Clone */
        .clone-whatsapp {
            background: #111b21;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .whatsapp-preview {
            width: 90%;
            height: 85%;
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
        }

        .wa-header {
            background: #202c33;
            padding: 8px;
            color: #fff;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .wa-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #25D366;
        }

        .wa-chat {
            padding: 8px;
        }

        .wa-message {
            background: #005c4b;
            color: white;
            padding: 5px;
            border-radius: 8px;
            font-size: 7px;
            margin-bottom: 5px;
            max-width: 80%;
        }

        .wa-message.in {
            background: #202c33;
        }

        /* YouTube Clone */
        .clone-youtube {
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .youtube-preview {
            width: 90%;
            height: 85%;
            display: flex;
            flex-direction: column;
        }

        .yt-header {
            display: flex;
            justify-content: space-between;
            color: white;
            padding: 5px;
        }

        .yt-logo {
            color: #ff0000;
            font-size: 16px;
        }

        .yt-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #333;
            border-radius: 8px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 8px;
        }

        .yt-info {
            display: flex;
            gap: 5px;
        }

        .yt-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #666;
        }

        /* Spotify Clone (Tambahan) */
        .clone-spotify {
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spotify-preview {
            width: 90%;
            height: 85%;
            display: flex;
            flex-direction: column;
        }

        .spotify-logo {
            color: #1DB954;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .spotify-card {
            background: #282828;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .spotify-cover {
            width: 30px;
            height: 30px;
            background: #333;
            border-radius: 4px;
        }

        .spotify-title {
            color: white;
            font-size: 8px;
        }

        .spotify-artist {
            color: #b3b3b3;
            font-size: 6px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                gap: 10px;
            }
            
            .clone-instagram,
            .clone-netflix,
            .clone-whatsapp,
            .clone-youtube,
            .clone-spotify {
                width: 30%;
                margin-bottom: 15px;
            }
        }

        @media (max-width: 600px) {
            .clone-instagram,
            .clone-netflix,
            .clone-whatsapp,
            .clone-youtube,
            .clone-spotify {
                width: 45%;
            }
        }

        @media (max-width: 400px) {
            .clone-instagram,
            .clone-netflix,
            .clone-whatsapp,
            .clone-youtube,
            .clone-spotify {
                width: 90%;
            }
        }

        .credit {
            color: #94a3b8;
            margin-top: 30px;
            font-size: 14px;
        }

        .credit i {
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <h1>✨ <span>CodingX Indonet</span> ✨<br>5 Aplikasi Clone dalam 1 Baris</h1>

    <div class="container">

        <!-- Spotify Clone -->
        <div class="clone-spotify" onclick="alert('Spotify Clone - CodingX Indonet 💼📝💰')">
            <div class="spotify-preview">

                <div class="spotify-card">

                        <div class="spotify-title">CodingX Mix</div>

</html>
