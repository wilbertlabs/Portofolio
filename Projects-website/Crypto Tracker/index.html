<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tracker - CodingX Indonet</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b0f1a, #1a1f2b);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            outline: none;
            width: 300px;
        }

        .search-box button {
            padding: 12px 24px;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-title {
            color: #94a3b8;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .stat-icon.btc { background: #f7931a20; color: #f7931a; }
        .stat-icon.eth { background: #627eea20; color: #627eea; }
        .stat-icon.usdt { background: #26a17b20; color: #26a17b; }
        .stat-icon.bnb { background: #f3ba2f20; color: #f3ba2f; }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-change {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        .stat-change.positive { color: #10b981; }
        .stat-change.negative { color: #ef4444; }

        /* Chart Section */
        .chart-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
        }

        .time-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .time-btn:hover,
        .time-btn.active {
            background: #ffd700;
            color: black;
        }

        .chart-container {
            height: 400px;
        }

        /* Watchlist */
        .watchlist-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .add-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn:hover {
            background: #ffd700;
            color: black;
        }

        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .watchlist-item {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .watchlist-item:hover {
            transform: translateY(-2px);
            border-color: #ffd700;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coin-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .coin-details h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .coin-symbol {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .coin-price {
            text-align: right;
        }

        .price-value {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .price-change {
            font-size: 0.8rem;
        }

        .remove-btn {
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .watchlist-item:hover .remove-btn {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .chart-controls {
                flex-wrap: wrap;
            }
        }

        
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📈 Crypto Tracker</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search cryptocurrency...">
                <button id="searchBtn">Add to Watchlist</button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <!-- Akan diisi JavaScript -->
        </div>

        <!-- Chart Section -->
        <div class="chart-section">
            <div class="chart-header">
                <h2>BTC/USDT Price Chart</h2>
                <div class="chart-controls">
                    <button class="time-btn active" data-time="1D">1D</button>
                    <button class="time-btn" data-time="1W">1W</button>
                    <button class="time-btn" data-time="1M">1M</button>
                    <button class="time-btn" data-time="1Y">1Y</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <!-- Watchlist -->
        <div class="watchlist-section">
            <div class="section-header">
                <h2>📋 My Watchlist</h2>
                <button class="add-btn" id="addRandomBtn">
                    <i class="fa-solid fa-plus"></i> Add Random
                </button>
            </div>
            <div class="watchlist-grid" id="watchlistGrid">
                <!-- Akan diisi JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Sample crypto data
        const cryptos = [
            { symbol: 'BTC', name: 'Bitcoin', price: 43250.80, change24h: 2.5, icon: '₿', color: '#f7931a' },
            { symbol: 'ETH', name: 'Ethereum', price: 2250.40, change24h: 1.8, icon: 'Ξ', color: '#627eea' },
            { symbol: 'USDT', name: 'Tether', price: 1.00, change24h: 0.01, icon: '₮', color: '#26a17b' },
            { symbol: 'BNB', name: 'Binance Coin', price: 312.75, change24h: -0.5, icon: 'BNB', color: '#f3ba2f' },
            { symbol: 'SOL', name: 'Solana', price: 98.25, change24h: 5.2, icon: 'SOL', color: '#00ffa3' },
            { symbol: 'XRP', name: 'Ripple', price: 0.52, change24h: -1.2, icon: 'XRP', color: '#23292f' },
            { symbol: 'ADA', name: 'Cardano', price: 0.38, change24h: 0.8, icon: 'ADA', color: '#0033ad' },
            { symbol: 'DOGE', name: 'Dogecoin', price: 0.082, change24h: 3.4, icon: 'Ð', color: '#c3a634' }
        ];

        // Watchlist state
        let watchlist = JSON.parse(localStorage.getItem('cryptoWatchlist')) || [
            cryptos[0], cryptos[1], cryptos[2]
        ];

        // Chart state
        let priceChart;
        let currentTimeframe = '1D';

        // DOM Elements
        const statsGrid = document.getElementById('statsGrid');
        const watchlistGrid = document.getElementById('watchlistGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const addRandomBtn = document.getElementById('addRandomBtn');

        // Load stats
        function loadStats() {
            const topCryptos = cryptos.slice(0, 4);
            statsGrid.innerHTML = topCryptos.map(crypto => `
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-title">${crypto.name} (${crypto.symbol})</span>
                        <div class="stat-icon ${crypto.symbol.toLowerCase()}">
                            ${crypto.icon}
                        </div>
                    </div>
                    <div class="stat-value">$${crypto.price.toFixed(2)}</div>
                    <div class="stat-change ${crypto.change24h >= 0 ? 'positive' : 'negative'}">
                        <i class="fa-solid fa-${crypto.change24h >= 0 ? 'arrow-up' : 'arrow-down'}"></i>
                        ${Math.abs(crypto.change24h)}% (24h)
                    </div>
                </div>
            `).join('');
        }

        // Load watchlist
        function loadWatchlist() {
            watchlistGrid.innerHTML = watchlist.map((crypto, index) => `
                <div class="watchlist-item" onclick="selectCoin('${crypto.symbol}')">
                    <div class="coin-info">
                        <div class="coin-icon" style="background: ${crypto.color}20; color: ${crypto.color}">
                            ${crypto.icon}
                        </div>
                        <div class="coin-details">
                            <h4>${crypto.name}</h4>
                            <span class="coin-symbol">${crypto.symbol}</span>
                        </div>
                    </div>
                    <div class="coin-price">
                        <div class="price-value">$${crypto.price.toFixed(2)}</div>
                        <div class="price-change ${crypto.change24h >= 0 ? 'positive' : 'negative'}">
                            ${crypto.change24h >= 0 ? '+' : ''}${crypto.change24h}%
                        </div>
                    </div>
                    <div class="remove-btn" onclick="removeFromWatchlist(${index}, event)">
                        <i class="fa-solid fa-times"></i>
                    </div>
                </div>
            `).join('');

            localStorage.setItem('cryptoWatchlist', JSON.stringify(watchlist));
        }

        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            // Generate sample data based on timeframe
            const data = generateChartData(currentTimeframe);

            if (priceChart) {
                priceChart.destroy();
            }

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'BTC Price',
                        data: data.prices,
                        borderColor: '#ffd700',
                        backgroundColor: 'rgba(255, 215, 0, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            },
                            ticks: {
                                color: '#94a3b8'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#94a3b8'
                            }
                        }
                    }
                }
            });
        }

        // Generate chart data
        function generateChartData(timeframe) {
            let points = 30;
            let labels = [];
            let prices = [];
            let basePrice = 43000;

            switch(timeframe) {
                case '1D':
                    points = 24;
                    labels = Array.from({length: 24}, (_, i) => `${i}:00`);
                    break;
                case '1W':
                    points = 7;
                    labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                    break;
                case '1M':
                    points = 30;
                    labels = Array.from({length: 30}, (_, i) => `Day ${i+1}`);
                    break;
                case '1Y':
                    points = 12;
                    labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    break;
            }

            for (let i = 0; i < points; i++) {
                const change = (Math.random() - 0.5) * 2000;
                prices.push(basePrice + change);
                basePrice += (Math.random() - 0.5) * 500;
            }

            return { labels, prices };
        }

        // Select coin
        window.selectCoin = function(symbol) {
            alert(`📊 ${symbol} chart will be displayed here`);
        };

        // Remove from watchlist
        window.removeFromWatchlist = function(index, event) {
            event.stopPropagation();
            watchlist.splice(index, 1);
            loadWatchlist();
        };

        // Add to watchlist
        function addToWatchlist(symbol) {
            const crypto = cryptos.find(c => c.symbol.toLowerCase() === symbol.toLowerCase() || 
                                            c.name.toLowerCase().includes(symbol.toLowerCase()));
            
            if (!crypto) {
                alert('Cryptocurrency not found!');
                return;
            }

            if (watchlist.some(c => c.symbol === crypto.symbol)) {
                alert(`${crypto.symbol} already in watchlist!`);
                return;
            }

            watchlist.push(crypto);
            loadWatchlist();
            searchInput.value = '';
        }

        // Add random crypto
        function addRandomCrypto() {
            const available = cryptos.filter(c => !watchlist.some(w => w.symbol === c.symbol));
            if (available.length === 0) {
                alert('All cryptos are already in watchlist!');
                return;
            }

            const random = available[Math.floor(Math.random() * available.length)];
            watchlist.push(random);
            loadWatchlist();
        }

        // Event Listeners
        searchBtn.addEventListener('click', () => {
            addToWatchlist(searchInput.value);
        });

        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                addToWatchlist(searchInput.value);
            }
        });

        addRandomBtn.addEventListener('click', addRandomCrypto);

        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTimeframe = this.dataset.time;
                initChart();
            });
        });

        // Simulate real-time price updates
        function simulatePriceUpdates() {
            setInterval(() => {
                watchlist = watchlist.map(crypto => ({
                    ...crypto,
                    price: crypto.price * (1 + (Math.random() - 0.5) * 0.02),
                    change24h: crypto.change24h + (Math.random() - 0.5)
                }));
                
                // Update stats as well
                cryptos.forEach(crypto => {
                    crypto.price = crypto.price * (1 + (Math.random() - 0.5) * 0.02);
                    crypto.change24h = crypto.change24h + (Math.random() - 0.5);
                });

                loadStats();
                loadWatchlist();
            }, 5000);
        }

        // Initialize
        loadStats();
        loadWatchlist();
        initChart();
        simulatePriceUpdates();
    </script>
</body>
</html>
