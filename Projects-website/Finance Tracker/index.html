    <script>
        // Data transaksi
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [
            {
                id: 1,
                date: '2024-01-15',
                category: 'gaji',
                amount: 5000000,
                description: 'Gaji Bulanan',
                type: 'income'
            },
            {
                id: 2,
                date: '2024-01-16',
                category: 'makanan',
                amount: 150000,
                description: 'Makan siang',
                type: 'expense'
            },
            {
                id: 3,
                date: '2024-01-17',
                category: 'transport',
                amount: 50000,
                description: 'Bensin',
                type: 'expense'
            },
            {
                id: 4,
                date: '2024-01-18',
                category: 'belanja',
                amount: 500000,
                description: 'Belanja bulanan',
                type: 'expense'
            },
            {
                id: 5,
                date: '2024-01-20',
                category: 'bisnis',
                amount: 2000000,
                description: 'Freelance project',
                type: 'income'
            }
        ];

        // Chart instances
        let monthlyChart, categoryChart;

        // Initialize
        function init() {
            updateSummary();
            populateCategoryFilter();
            renderTransactions();
            updateCharts();
            updateCategorySummary();
        }

        // Update summary cards
        function updateSummary() {
            const totalIncome = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const balance = totalIncome - totalExpense;

            const currentMonth = new Date().getMonth() + 1;
            const monthlyTransactions = transactions.filter(t => {
                const month = parseInt(t.date.split('-')[1]);
                return month === currentMonth;
            }).length;

            document.getElementById('totalBalance').textContent = formatRupiah(balance);
            document.getElementById('totalIncome').textContent = formatRupiah(totalIncome);
            document.getElementById('totalExpense').textContent = formatRupiah(totalExpense);
            document.getElementById('monthlyTransactions').textContent = monthlyTransactions;
        }

        // Format Rupiah
        function formatRupiah(amount) {
            return 'Rp ' + amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        // Get category name
        function getCategoryName(category) {
            const categories = {
                'gaji': 'Gaji',
                'bisnis': 'Bisnis',
                'investasi': 'Investasi',
                'makanan': 'Makanan',
                'transport': 'Transportasi',
                'belanja': 'Belanja',
                'hiburan': 'Hiburan',
                'tagihan': 'Tagihan',
                'kesehatan': 'Kesehatan',
                'pendidikan': 'Pendidikan',
                'lainnya': 'Lainnya'
            };
            return categories[category] || category;
        }

        // Populate category filter
        function populateCategoryFilter() {
            const categories = [...new Set(transactions.map(t => t.category))];
            const select = document.getElementById('categoryFilter');
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = getCategoryName(category);
                select.appendChild(option);
            });
        }

        // Add transaction
        function addTransaction() {
            const date = document.getElementById('transactionDate').value;
            const category = document.getElementById('transactionCategory').value;
            const amount = parseInt(document.getElementById('transactionAmount').value);
            const description = document.getElementById('transactionDesc').value;
            const type = document.querySelector('input[name="transactionType"]:checked').value;

            if (!date || !amount || !description) {
                alert('Semua field harus diisi!');
                return;
            }

            const newTransaction = {
                id: Date.now(),
                date,
                category,
                amount,
                description,
                type
            };

            transactions.push(newTransaction);
            saveTransactions();
            
            // Clear form
            document.getElementById('transactionAmount').value = '';
            document.getElementById('transactionDesc').value = '';
            
            // Refresh
            updateSummary();
            renderTransactions();
            updateCharts();
            updateCategorySummary();
        }

        // Delete transaction
        function deleteTransaction(id) {
            if (confirm('Yakin ingin menghapus transaksi ini?')) {
                transactions = transactions.filter(t => t.id !== id);
                saveTransactions();
                updateSummary();
                renderTransactions();
                updateCharts();
                updateCategorySummary();
            }
        }

        // Edit transaction
        function editTransaction(id) {
            const transaction = transactions.find(t => t.id === id);
            if (transaction) {
                document.getElementById('transactionDate').value = transaction.date;
                document.getElementById('transactionCategory').value = transaction.category;
                document.getElementById('transactionAmount').value = transaction.amount;
                document.getElementById('transactionDesc').value = transaction.description;
                
                if (transaction.type === 'income') {
                    document.querySelector('input[value="income"]').checked = true;
                } else {
                    document.querySelector('input[value="expense"]').checked = true;
                }

                deleteTransaction(id);
            }
        }

        // Render transactions
        function renderTransactions() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const monthFilter = document.getElementById('monthFilter').value;

            const filtered = transactions.filter(t => {
                const matchesSearch = t.description.toLowerCase().includes(searchTerm);
                const matchesCategory = !categoryFilter || t.category === categoryFilter;
                const matchesType = !typeFilter || t.type === typeFilter;
                const matchesMonth = !monthFilter || parseInt(t.date.split('-')[1]) === parseInt(monthFilter);
                
                return matchesSearch && matchesCategory && matchesType && matchesMonth;
            });

            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).map(t => `
                <tr>
                    <td>${new Date(t.date).toLocaleDateString('id-ID')}</td>
                    <td>${t.description}</td>
                    <td><span class="category-badge">${getCategoryName(t.category)}</span></td>
                    <td>${t.type === 'income' ? 'Pemasukan' : 'Pengeluaran'}</td>
                    <td class="${t.type === 'income' ? 'transaction-income' : 'transaction-expense'}">
                        ${t.type === 'income' ? '+' : '-'} ${formatRupiah(t.amount)}
                    </td>
                    <td>
                        <button class="action-btn edit" onclick="editTransaction(${t.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn" onclick="deleteTransaction(${t.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Update charts
        function updateCharts() {
            // Monthly chart
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            const monthlyIncome = new Array(12).fill(0);
            const monthlyExpense = new Array(12).fill(0);

            transactions.forEach(t => {
                const month = parseInt(t.date.split('-')[1]) - 1;
                if (t.type === 'income') {
                    monthlyIncome[month] += t.amount;
                } else {
                    monthlyExpense[month] += t.amount;
                }
            });

            if (monthlyChart) {
                monthlyChart.destroy();
            }

            const ctx1 = document.getElementById('monthlyChart').getContext('2d');
            monthlyChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [
                        {
                            label: 'Pemasukan',
                            data: monthlyIncome,
                            borderColor: '#38ef7d',
                            backgroundColor: 'rgba(56, 239, 125, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Pengeluaran',
                            data: monthlyExpense,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    }
                }
            });

            // Category chart
            const categoryExpenses = {};
            transactions.filter(t => t.type === 'expense').forEach(t => {
                if (!categoryExpenses[t.category]) {
                    categoryExpenses[t.category] = 0;
                }
                categoryExpenses[t.category] += t.amount;
            });

            const categoryColors = {
                'makanan': '#ff6b6b',
                'transport': '#4ecdc4',
                'belanja': '#45b7d1',
                'hiburan': '#96ceb4',
                'tagihan': '#ffeaa7',
                'kesehatan': '#dfe6e9',
                'pendidikan': '#b2bec3',
                'lainnya': '#636e72'
            };

            if (categoryChart) {
                categoryChart.destroy();
            }

            const ctx2 = document.getElementById('categoryChart').getContext('2d');
            categoryChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categoryExpenses).map(c => getCategoryName(c)),
                    datasets: [{
                        data: Object.values(categoryExpenses),
                        backgroundColor: Object.keys(categoryExpenses).map(c => categoryColors[c] || '#11998e'),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                        }
                    }
                }
            });
        }

        // Update category summary
        function updateCategorySummary() {
            const categoryExpenses = {};
            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            transactions.filter(t => t.type === 'expense').forEach(t => {
                if (!categoryExpenses[t.category]) {
                    categoryExpenses[t.category] = 0;
                }
                categoryExpenses[t.category] += t.amount;
            });

            const categoryColors = {
                'makanan': '#ff6b6b',
                'transport': '#4ecdc4',
                'belanja': '#45b7d1',
                'hiburan': '#96ceb4',
                'tagihan': '#ffeaa7',
                'kesehatan': '#dfe6e9',
                'pendidikan': '#b2bec3',
                'lainnya': '#636e72'
            };

            const summary = document.getElementById('categorySummary');
            summary.innerHTML = Object.entries(categoryExpenses)
                .sort((a, b) => b[1] - a[1])
                .map(([category, amount]) => `
                    <div class="category-item">
                        <div class="category-info">
                            <div class="category-color" style="background: ${categoryColors[category] || '#11998e'}"></div>
                            <span class="category-name">${getCategoryName(category)}</span>
                        </div>
                        <div>
                            <span class="category-amount">${formatRupiah(amount)}</span>
                            <span class="category-percent">(${Math.round((amount / totalExpense) * 100)}%)</span>
                        </div>
                    </div>
                `).join('');
        }

        // Save to localStorage
        function saveTransactions() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Event listeners for filters
        document.getElementById('searchInput').addEventListener('input', renderTransactions);
        document.getElementById('categoryFilter').addEventListener('change', renderTransactions);
        document.getElementById('typeFilter').addEventListener('change', renderTransactions);
        document.getElementById('monthFilter').addEventListener('change', renderTransactions);

        // Initialize
        init();
    </script>
</body>
</html>
