<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search App - CodingX Indonet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Search Section */
        .search-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        #searchInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102,126,234,0.3);
        }

        #searchBtn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s;
        }

        #searchBtn:hover {
            transform: scale(1.05);
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1em;
            cursor: pointer;
        }

        /* Movies Grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .movie-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            cursor: pointer;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .movie-poster {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .movie-info {
            padding: 20px;
        }

        .movie-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .movie-year {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .movie-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .genre-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            color: #ffd700;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            position: relative;
            background: white;
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            border-radius: 20px;
            padding: 30px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close:hover {
            color: #333;
        }

        .modal-body {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .modal-poster {
            width: 200px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        .modal-details {
            flex: 1;
        }

        .modal-title {
            font-size: 2em;
            margin-bottom: 10px;
            color: #333;
        }

        .modal-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #666;
        }

        .modal-overview {
            line-height: 1.6;
            color: #444;
            margin-bottom: 20px;
        }

        .modal-cast {
            color: #666;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 3px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ================================= */
/* PERFECT RESPONSIVE IMPROVEMENT */
/* ================================= */

/* Global safety */
html, body {
    overflow-x: hidden;
}

/* Header responsive */
@media (max-width: 768px) {
    h1 {
        font-size: 2em;
    }

    .subtitle {
        font-size: 1em;
    }
}

/* Search section mobile */
@media (max-width: 768px) {
    .search-container {
        flex-direction: column;
    }

    #searchBtn {
        width: 100%;
    }

    #searchInput {
        width: 100%;
    }
}

/* Filters center & wrap properly */
@media (max-width: 768px) {
    .filters {
        justify-content: center;
    }

    .filter-select {
        flex: 1 1 100%;
    }
}

/* Movies grid ultra smooth */
@media (max-width: 768px) {
    .movies-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }

    .movie-poster {
        height: 260px;
    }
}

@media (max-width: 480px) {
    .movies-grid {
        grid-template-columns: 1fr;
    }

    .movie-poster {
        height: 300px;
    }
}

/* Modal responsive fix */
@media (max-width: 768px) {

    .modal-content {
        width: 95%;
        margin: 20px auto;
        padding: 20px;
    }

    .modal-body {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .modal-poster {
        width: 180px;
        height: 260px;
    }

    .modal-meta {
        justify-content: center;
        flex-wrap: wrap;
    }
}

/* Ultra small devices */
@media (max-width: 380px) {

    body {
        padding: 10px;
    }

    h1 {
        font-size: 1.6em;
    }

    .search-section {
        padding: 20px;
    }

}

    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Movie Search App</h1>
            <p class="subtitle">Temukan film favorit Anda dengan mudah!</p>
        </header>

        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Cari judul film...">
                <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
            </div>
            <div class="filters">
                <select id="genreFilter" class="filter-select">
                    <option value="">Semua Genre</option>
                </select>
                <select id="yearFilter" class="filter-select">
                    <option value="">Semua Tahun</option>
                </select>
                <select id="ratingFilter" class="filter-select">
                    <option value="">Semua Rating</option>
                    <option value="9">9+</option>
                    <option value="8">8+</option>
                    <option value="7">7+</option>
                    <option value="6">6+</option>
                </select>
            </div>
        </div>

        <div id="moviesGrid" class="movies-grid"></div>
    </div>

    <!-- Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        // Simulasi API Data
        const movies = [
            {
                id: 1,
                title: "Inception",
                year: 2010,
                rating: 8.8,
                genres: ["Sci-Fi", "Action", "Thriller"],
                poster: "https://via.placeholder.com/300x450/667eea/ffffff?text=Inception",
                overview: "Seorang pencuri yang mencuri rahasia perusahaan melalui teknologi mimpi diberikan tugas sebaliknya: menanamkan ide ke dalam pikiran seseorang.",
                cast: ["Leonardo DiCaprio", "Joseph Gordon-Levitt", "Elliot Page"]
            },
            {
                id: 2,
                title: "The Dark Knight",
                year: 2008,
                rating: 9.0,
                genres: ["Action", "Crime", "Drama"],
                poster: "https://via.placeholder.com/300x450/764ba2/ffffff?text=Dark+Knight",
                overview: "Batman menghadapi tantangan terbesarnya saat Joker, seorang penjahat anarkis, mengganggu ketertiban di Gotham City.",
                cast: ["Christian Bale", "Heath Ledger", "Aaron Eckhart"]
            },
            {
                id: 3,
                title: "Interstellar",
                year: 2014,
                rating: 8.6,
                genres: ["Sci-Fi", "Adventure", "Drama"],
                poster: "https://via.placeholder.com/300x450/667eea/ffffff?text=Interstellar",
                overview: "Sekelompok penjelajah ruang angkasa melakukan perjalanan melalui lubang cacing untuk mencari rumah baru bagi umat manusia.",
                cast: ["Matthew McConaughey", "Anne Hathaway", "Jessica Chastain"]
            },
            {
                id: 4,
                title: "Parasite",
                year: 2019,
                rating: 8.6,
                genres: ["Drama", "Thriller", "Comedy"],
                poster: "https://via.placeholder.com/300x450/764ba2/ffffff?text=Parasite",
                overview: "Keluarga miskin menyusup ke rumah tangga kaya dengan konsekuensi yang tak terduga.",
                cast: ["Song Kang-ho", "Lee Sun-kyun", "Cho Yeo-jeong"]
            },
            {
                id: 5,
                title: "The Matrix",
                year: 1999,
                rating: 8.7,
                genres: ["Sci-Fi", "Action"],
                poster: "https://via.placeholder.com/300x450/667eea/ffffff?text=Matrix",
                overview: "Seorang peretas menemukan kenyataan pahit tentang realitas dan perannya dalam perang melawan penguasanya.",
                cast: ["Keanu Reeves", "Laurence Fishburne", "Carrie-Anne Moss"]
            },
            {
                id: 6,
                title: "Pulp Fiction",
                year: 1994,
                rating: 8.9,
                genres: ["Crime", "Drama"],
                poster: "https://via.placeholder.com/300x450/764ba2/ffffff?text=Pulp+Fiction",
                overview: "Berbagai kisah kehidupan penjahat, petinju, dan gangster yang saling terkait di Los Angeles.",
                cast: ["John Travolta", "Uma Thurman", "Samuel L. Jackson"]
            },
            {
                id: 7,
                title: "The Godfather",
                year: 1972,
                rating: 9.2,
                genres: ["Crime", "Drama"],
                poster: "https://via.placeholder.com/300x450/667eea/ffffff?text=Godfather",
                overview: "Kisah keluarga mafia Corleone di bawah pimpinan Vito Corleone.",
                cast: ["Marlon Brando", "Al Pacino", "James Caan"]
            },
            {
                id: 8,
                title: "Avengers: Endgame",
                year: 2019,
                rating: 8.4,
                genres: ["Action", "Adventure", "Sci-Fi"],
                poster: "https://via.placeholder.com/300x450/764ba2/ffffff?text=Avengers",
                overview: "Para Avengers yang tersisa berusaha membalikkan kerusakan yang disebabkan oleh Thanos.",
                cast: ["Robert Downey Jr.", "Chris Evans", "Scarlett Johansson"]
            }
        ];

        // Ambil semua genre unik
        const allGenres = [...new Set(movies.flatMap(movie => movie.genres))];
        
        // Ambil semua tahun unik
        const allYears = [...new Set(movies.map(movie => movie.year))].sort((a, b) => b - a);

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const genreFilter = document.getElementById('genreFilter');
        const yearFilter = document.getElementById('yearFilter');
        const ratingFilter = document.getElementById('ratingFilter');
        const moviesGrid = document.getElementById('moviesGrid');
        const modal = document.getElementById('movieModal');
        const modalBody = document.getElementById('modalBody');
        const closeBtn = document.querySelector('.close');

        // Initialize filters
        function initializeFilters() {
            // Populate genre filter
            allGenres.forEach(genre => {
                const option = document.createElement('option');
                option.value = genre;
                option.textContent = genre;
                genreFilter.appendChild(option);
            });

            // Populate year filter
            allYears.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearFilter.appendChild(option);
            });
        }

        // Filter movies
        function filterMovies() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedGenre = genreFilter.value;
            const selectedYear = yearFilter.value;
            const selectedRating = ratingFilter.value;

            return movies.filter(movie => {
                // Search filter
                const matchesSearch = movie.title.toLowerCase().includes(searchTerm);
                
                // Genre filter
                const matchesGenre = !selectedGenre || movie.genres.includes(selectedGenre);
                
                // Year filter
                const matchesYear = !selectedYear || movie.year === parseInt(selectedYear);
                
                // Rating filter
                const matchesRating = !selectedRating || movie.rating >= parseFloat(selectedRating);

                return matchesSearch && matchesGenre && matchesYear && matchesRating;
            });
        }

        // Display movies
        function displayMovies() {
            const filteredMovies = filterMovies();
            
            if (filteredMovies.length === 0) {
                moviesGrid.innerHTML = '<div class="loading">Tidak ada film yang ditemukan</div>';
                return;
            }

            moviesGrid.innerHTML = filteredMovies.map(movie => `
                <div class="movie-card" onclick="showMovieDetails(${movie.id})">
                    <img src="${movie.poster}" alt="${movie.title}" class="movie-poster">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year}</div>
                        <div class="movie-genres">
                            ${movie.genres.map(genre => `<span class="genre-tag">${genre}</span>`).join('')}
                        </div>
                        <div class="movie-rating">
                            <i class="fas fa-star"></i>
                            <span>${movie.rating}/10</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Show movie details in modal
        function showMovieDetails(movieId) {
            const movie = movies.find(m => m.id === movieId);
            
            modalBody.innerHTML = `
                <img src="${movie.poster}" alt="${movie.title}" class="modal-poster">
                <div class="modal-details">
                    <h2 class="modal-title">${movie.title}</h2>
                    <div class="modal-meta">
                        <span><i class="fas fa-calendar"></i> ${movie.year}</span>
                        <span><i class="fas fa-star"></i> ${movie.rating}/10</span>
                    </div>
                    <div class="modal-overview">${movie.overview}</div>
                    <div class="modal-cast">
                        <strong><i class="fas fa-users"></i> Cast:</strong>
                        <p>${movie.cast.join(', ')}</p>
                    </div>
                    <div class="movie-genres" style="margin-top: 20px;">
                        ${movie.genres.map(genre => `<span class="genre-tag">${genre}</span>`).join('')}
                    </div>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        // Event Listeners
        searchBtn.addEventListener('click', displayMovies);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') displayMovies();
        });
        genreFilter.addEventListener('change', displayMovies);
        yearFilter.addEventListener('change', displayMovies);
        ratingFilter.addEventListener('change', displayMovies);

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Initialize
        initializeFilters();
        displayMovies();
    </script>
</body>
</html>
