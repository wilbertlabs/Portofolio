<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - CodingX Indonet</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        /* Header */
        .quiz-header {
            background: linear-gradient(145deg, #667eea, #764ba2);
            padding: 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quiz-info h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .quiz-meta {
            display: flex;
            gap: 20px;
        }

        .quiz-meta span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .timer {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
        }

        .timer .time {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .timer .label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Progress Bar */
        .progress-bar {
            height: 10px;
            background: #e9e9e9;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        /* Main Content */
        .quiz-content {
            padding: 30px;
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Options */
        .options-container {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e9e9e9;
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover {
            background: #f1f3f5;
            border-color: #667eea;
        }

        .option.selected {
            background: #667eea20;
            border-color: #667eea;
        }

        .option.correct {
            background: #10b98120;
            border-color: #10b981;
        }

        .option.wrong {
            background: #ef444420;
            border-color: #ef4444;
        }

        .option-prefix {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .option-text {
            flex: 1;
            color: #333;
        }

        /* Navigation */
        .quiz-footer {
            padding: 30px;
            border-top: 1px solid #e9e9e9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn.prev {
            background: #f1f3f5;
            color: #64748b;
        }

        .nav-btn.next {
            background: #667eea;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        .question-counter {
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Results */
        .results-container {
            padding: 30px;
            text-align: center;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .score-number {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .leaderboard-section {
            margin-top: 30px;
            text-align: left;
        }

        .leaderboard-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }

        .leaderboard-list {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
        }

        .leaderboard-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e9e9e9;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .rank.gold { background: #ffd700; color: #333; }
        .rank.silver { background: #c0c0c0; color: #333; }
        .rank.bronze { background: #cd7f32; color: white; }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            color: #333;
        }

        .player-score {
            color: #64748b;
            font-size: 0.9rem;
        }

        .player-time {
            color: #667eea;
            font-weight: 600;
        }

        .restart-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .quiz-header {
                flex-direction: column;
                gap: 20px;
            }

            .results-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quizContainer">
        <!-- Quiz Header -->
        <div class="quiz-header">
            <div class="quiz-info">
                <h1>🧠 Quiz Challenge</h1>
                <div class="quiz-meta">
                    <span><i class="fa-regular fa-clock"></i> 10 Questions</span>
                    <span><i class="fa-regular fa-star"></i> Random Order</span>
                </div>
            </div>
            <div class="timer">
                <div class="time" id="timer">05:00</div>
                <div class="label">Time Remaining</div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <!-- Quiz Content -->
        <div id="quizContent"></div>
    </div>

    <script>
        // Quiz questions
        const questions = [
            {
                question: "Apa kepanjangan dari HTML?",
                options: [
                    "Hyper Text Markup Language",
                    "High Tech Modern Language",
                    "Hyper Transfer Markup Language",
                    "Home Tool Markup Language"
                ],
                correct: 0
            },
            {
                question: "CSS digunakan untuk...",
                options: [
                    "Membuat struktur website",
                    "Menambahkan interaktivitas",
                    "Mengatur tampilan website",
                    "Menyimpan data website"
                ],
                correct: 2
            },
            {
                question: "JavaScript adalah bahasa pemrograman yang bersifat...",
                options: [
                    "Server-side only",
                    "Client-side only",
                    "Client-side dan Server-side",
                    "Database language"
                ],
                correct: 2
            },
            {
                question: "Fungsi dari localStorage adalah...",
                options: [
                    "Menyimpan data di server",
                    "Menyimpan data di browser secara permanen",
                    "Menyimpan data session",
                    "Menyimpan cache website"
                ],
                correct: 1
            },
            {
                question: "Apa itu responsive web design?",
                options: [
                    "Website yang cepat loading",
                    "Website yang bisa menyesuaikan dengan ukuran layar",
                    "Website dengan banyak animasi",
                    "Website yang aman dari serangan"
                ],
                correct: 1
            },
            {
                question: "Framework CSS yang populer adalah...",
                options: [
                    "React",
                    "Vue.js",
                    "Tailwind CSS",
                    "Node.js"
                ],
                correct: 2
            },
            {
                question: "HTTP status code 404 berarti...",
                options: [
                    "OK",
                    "Not Found",
                    "Internal Server Error",
                    "Forbidden"
                ],
                correct: 1
            },
            {
                question: "Apa fungsi dari Git?",
                options: [
                    "Menjalankan server",
                    "Version control system",
                    "Package manager",
                    "Text editor"
                ],
                correct: 1
            },
            {
                question: "API singkatan dari...",
                options: [
                    "Application Programming Interface",
                    "Advanced Program Integration",
                    "Application Process Integration",
                    "Automated Program Interface"
                ],
                correct: 0
            },
            {
                question: "Apa itu DOM dalam JavaScript?",
                options: [
                    "Data Object Model",
                    "Document Object Model",
                    "Digital Object Management",
                    "Document Order Management"
                ],
                correct: 1
            }
        ];

        // Quiz state
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let timer;
        let timeLeft = 300; // 5 minutes in seconds
        let quizCompleted = false;

        // Leaderboard
        let leaderboard = JSON.parse(localStorage.getItem('quizLeaderboard')) || [];

        // DOM Elements
        const quizContent = document.getElementById('quizContent');
        const progressFill = document.getElementById('progressFill');
        const timerDisplay = document.getElementById('timer');

        // Shuffle questions
        function shuffleQuestions() {
            currentQuestions = [...questions];
            for (let i = currentQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
            }
        }

        // Initialize quiz
        function initQuiz() {
            shuffleQuestions();
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            timeLeft = 300;
            quizCompleted = false;
            startTimer();
            renderQuestion();
        }

        // Start timer
        function startTimer() {
            if (timer) clearInterval(timer);
            
            timer = setInterval(() => {
                if (quizCompleted) return;
                
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    finishQuiz();
                }
            }, 1000);
        }

        // Update timer display
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 60) {
                timerDisplay.style.color = '#ef4444';
            } else {
                timerDisplay.style.color = 'white';
            }
        }

        // Render question
        function renderQuestion() {
            if (quizCompleted) return;

            const question = currentQuestions[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressFill.style.width = `${progress}%`;

            quizContent.innerHTML = `
                <div class="quiz-content">
                    <div class="question-number">Question ${currentQuestionIndex + 1}/${questions.length}</div>
                    <div class="question-text">${question.question}</div>
                    <div class="options-container">
                        ${question.options.map((option, index) => `
                            <div class="option ${userAnswers[currentQuestionIndex] === index ? 'selected' : ''}" 
                                 onclick="selectOption(${index})">
                                <div class="option-prefix">${String.fromCharCode(65 + index)}</div>
                                <div class="option-text">${option}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="quiz-footer">
                    <div class="nav-buttons">
                        <button class="nav-btn prev" ${currentQuestionIndex === 0 ? 'disabled' : ''} onclick="prevQuestion()">
                            <i class="fa-solid fa-arrow-left"></i> Previous
                        </button>
                        <button class="nav-btn next" onclick="nextQuestion()">
                            ${currentQuestionIndex === questions.length - 1 ? 'Finish' : 'Next'} 
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                    <div class="question-counter">
                        ${currentQuestionIndex + 1} / ${questions.length}
                    </div>
                </div>
            `;
        }

        // Select option
        window.selectOption = function(index) {
            if (quizCompleted) return;
            userAnswers[currentQuestionIndex] = index;
            renderQuestion();
        };

        // Previous question
        window.prevQuestion = function() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        };

        // Next question
        window.nextQuestion = function() {
            if (userAnswers[currentQuestionIndex] === null) {
                alert('Please select an answer!');
                return;
            }

            if (currentQuestionIndex === questions.length - 1) {
                finishQuiz();
            } else {
                currentQuestionIndex++;
                renderQuestion();
            }
        };

        // Finish quiz
        function finishQuiz() {
            quizCompleted = true;
            clearInterval(timer);

            // Calculate score
            let correct = 0;
            userAnswers.forEach((answer, index) => {
                if (answer === currentQuestions[index].correct) {
                    correct++;
                }
            });

            const score = Math.round((correct / questions.length) * 100);
            const timeSpent = 300 - timeLeft;
            const minutes = Math.floor(timeSpent / 60);
            const seconds = timeSpent % 60;

            // Save to leaderboard
            const playerName = prompt('Congratulations! Enter your name for the leaderboard:') || 'Anonymous';
            leaderboard.push({
                name: playerName,
                score: score,
                time: `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`,
                date: new Date().toLocaleDateString()
            });

            // Sort leaderboard by score (desc) and time (asc)
            leaderboard.sort((a, b) => {
                if (a.score !== b.score) return b.score - a.score;
                return a.time.localeCompare(b.time);
            });

            // Keep only top 10
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('quizLeaderboard', JSON.stringify(leaderboard));

            // Show results
            showResults(correct, score, timeSpent);
        }

        // Show results
        function showResults(correct, score, timeSpent) {
            const minutes = Math.floor(timeSpent / 60);
            const seconds = timeSpent % 60;

            quizContent.innerHTML = `
                <div class="results-container">
                    <div class="score-circle">
                        <span class="score-number">${score}%</span>
                        <span class="score-label">Score</span>
                    </div>
                    
                    <div class="results-stats">
                        <div class="stat-item">
                            <div class="stat-value">${correct}/${questions.length}</div>
                            <div class="stat-label">Correct Answers</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${minutes}:${seconds.toString().padStart(2, '0')}</div>
                            <div class="stat-label">Time Spent</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${questions.length - correct}</div>
                            <div class="stat-label">Wrong Answers</div>
                        </div>
                    </div>

                    <div class="leaderboard-section">
                        <h3 class="leaderboard-title">🏆 Top 10 Leaderboard</h3>
                        <div class="leaderboard-list">
                            ${leaderboard.map((entry, index) => `
                                <div class="leaderboard-item">
                                    <div class="rank ${index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : ''}">
                                        ${index + 1}
                                    </div>
                                    <div class="player-info">
                                        <div class="player-name">${entry.name}</div>
                                        <div class="player-score">${entry.date}</div>
                                    </div>
                                    <div class="player-time">${entry.score}% • ${entry.time}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <button class="restart-btn" onclick="initQuiz()">
                        <i class="fa-solid fa-rotate-right"></i> Play Again
                    </button>
                </div>
            `;
        }

        // Initialize quiz on load
        initQuiz();
    </script>
</body>
</html>
