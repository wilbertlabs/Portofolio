<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Login | Command Center</title>
    <style>
        :root {
            --bg-dark: #010409;
            --neon-primary: #0ea5e9;
            --neon-glow: rgba(14, 165, 233, 0.4);
            --glass-white: rgba(255, 255, 255, 0.03);
            --border-blue: rgba(14, 165, 233, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% -20%, #0c4a6e 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, #020617 0%, transparent 30%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Garis Scan Animasi */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-primary), transparent);
            opacity: 0.1;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            padding: 50px 35px;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-blue);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo-area {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border: 2px solid var(--neon-primary);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px var(--neon-glow);
            transform: rotate(45deg);
        }

        .logo-area span {
            transform: rotate(-45deg);
            font-weight: 900;
            color: var(--neon-primary);
            font-size: 24px;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: #fff;
        }

        p.desc {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 35px;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 15px 20px;
            box-sizing: border-box;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-primary);
            background: rgba(14, 165, 233, 0.05);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--neon-primary), #0284c7);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-login:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 8px 25px var(--neon-glow);
        }

        .btn-login:disabled {
            filter: grayscale(1);
            opacity: 0.5;
        }

        .links {
            margin-top: 25px;
            font-size: 12px;
            color: #475569;
        }

        .links a { color: var(--neon-primary); text-decoration: none; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area"><span>V</span></div>
        <h2>Sign In</h2>
        <p class="desc">Secure Access to Neural Network</p>

        <!-- FORM YANG SUDAH DIPERBAIKI -->
        <form id="signInform" action="https://moodle.igs.my.id/login/index.php" method="POST">
            <div class="input-box">
                <input type="text" id="email" name="username" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="password" id="pass" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login" id="btnAction" name="submit" value="Login">Authorize</button>
        </form>

        <div class="links">
            New operative? <a href="signup.html">Request Access</a>
        </div>
    </div>
